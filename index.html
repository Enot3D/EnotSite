<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnotSpace</title>
    <meta name="description" content="EnotSpace - каталог товаров, 3D-печать, моделирование и сканирование">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Actay:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/reset.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <script>
        document.documentElement.setAttribute('data-theme', 'light');
    </script>
    <link rel="stylesheet" href="style/header.css">
    <link rel="stylesheet" href="style/catalog.css">
    <link rel="stylesheet" href="style/services.css">
    <link rel="stylesheet" href="style/fullcycle.css">
    <link rel="stylesheet" href="style/print_by_model.css">
    <link rel="stylesheet" href="style/cart.css">
    <link rel="stylesheet" href="style/service_page.css">
    <link rel="stylesheet" href="style/account.css">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/footer.css">
    <link rel="stylesheet" href="style/features.css">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="src/js/firebase-config.js"></script>
    <script src="src/js/firebase-db.js"></script>
</head>

<body>
    <header class="header" id="site-header">
        <div class="header__container">
            <nav class="header__nav">
                <a href="index.html" class="header__logo-link">
                    <img class="header__logo" src="assets/favicon.ico" alt="EnotSpace">
                </a>
                <ul class="header__list-items">
                    <li><a class="header__link active" href="#" data-page="catalog">Каталог</a></li>
                    <li><a class="header__link" href="#" data-page="services">Услуги</a></li>
                    <li><a class="header__link" href="#" data-page="3dmodels">3D модели</a></li>
                </ul>
                <div class="header__actions">
                    <button class="header__user-btn" id="user-btn" title="Личный кабинет" style="display: none;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                    <button class="header__cart-btn" id="cart-btn" title="Корзина">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span class="header__cart-count" id="cart-count" style="display: none;">0</span>
                    </button>
                    <button class="header__login-btn" id="login-btn" title="Вход">ВХОД</button>
                </div>
            </nav>
        </div>
    </header>

    <div id="auth-placeholder"></div>

    <div id="main-placeholder"></div>

    <div id="footer-placeholder"></div>

    <nav class="mobile-nav" id="mobile-nav">
        <a href="#" class="mobile-nav__item active" data-page="catalog">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Каталог</span>
        </a>
        <a href="#" class="mobile-nav__item" data-page="services">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <span>Услуги</span>
        </a>
        <a href="#" class="mobile-nav__item" data-page="3dmodels">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            <span>3D модели</span>
        </a>
        <a href="#" class="mobile-nav__item" data-page="cart">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span>Корзина</span>
        </a>
        <a href="#" class="mobile-nav__item" data-page="account">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </a>
    </nav>

    <script src="src/js/utils.js"></script>
    <script src="src/data/products.js"></script>
    <script src="src/data/pages.js"></script>
    <script src="src/js/catalog.js"></script>
    <script src="src/js/fullcycle.js"></script>
    <script src="src/js/print_by_model.js"></script>
    <script src="src/js/cart.js"></script>
    <script src="src/js/service_pages.js"></script>
    <script src="src/js/auth.js"></script>
    <script src="src/js/admin.js"></script>
    <script src="src/js/admin_catalog.js"></script>
    <script src="src/js/client_features.js"></script>
    <script src="src/js/features.js"></script>

    <script>
        const routes = {
            catalog: 'catalog',
            services: 'services',
            '3dmodels': 'catalog',
            fullcycle: 'fullcycle',
            print: 'print',
            modeling: 'modeling',
            scanning: 'scanning',
            cart: 'cart',
            account: 'account',
            favorites: 'favorites',
            reviews: 'reviews',
            about: 'about'
        };

        function navigate(page) {
            if (!routes[page]) page = 'catalog';
            var key = routes[page];

            if (page !== 'account') {
                if (typeof clientChatUnsubscribe === 'function') { clientChatUnsubscribe(); clientChatUnsubscribe = null; }
                if (typeof adminChatUnsubscribe === 'function') { adminChatUnsubscribe(); adminChatUnsubscribe = null; }
                adminActiveClientIndex = -1;
            }

            if (page === 'favorites') {
                document.getElementById('main-placeholder').innerHTML = renderFavoritesPage();
                updateActiveLink(page);
                window.scrollTo(0, 0);
                return;
            }

            var html = PAGES[key];
            if (!html) return;

            document.getElementById('main-placeholder').innerHTML = html;
            updateActiveLink(page);
            window.scrollTo(0, 0);

            if (page === 'catalog' && typeof catalog !== 'undefined') {
                setTimeout(function() {
                    renderCatalogFilters();
                    catalog.reinit();
                }, 150);
            }
            if (page === 'fullcycle') {
                setTimeout(function() { initFullcycle(); }, 100);
            }
            if (page === 'print') {
                setTimeout(function() { initPrintOrder(); }, 100);
            }
            if (page === 'cart') {
                setTimeout(function() { initCart(); }, 100);
            }
            if (page === 'modeling' || page === 'scanning') {
                setTimeout(function() {
                    initServiceForms();
                    renderServicePriceEditor();
                }, 100);
            }
            if (page === 'account') {
                setTimeout(function() { initAccount(); }, 100);
            }
            if (page === 'reviews') {
                setTimeout(function() { initReviewsPage(); }, 100);
            }
            if (page === 'about') {
                document.getElementById('about-placeholder').innerHTML = renderAboutPage();
                setTimeout(function() {
                    loadAndRenderAbout();
                    initAboutPage();
                }, 100);
            }
        }

        function updateActiveLink(page) {
            document.querySelectorAll('.header__link').forEach(function(link) {
                link.classList.remove('active');
                if (link.dataset.page === page) {
                    link.classList.add('active');
                }
            });
            document.querySelectorAll('.mobile-nav__item').forEach(function(item) {
                item.classList.remove('active');
                if (item.dataset.page === page) {
                    item.classList.add('active');
                }
            });
        }

        function setupNavigation() {
            document.querySelectorAll('.header__link').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var page = link.dataset.page;
                    if (page) navigate(page);
                });
            });
            var cartBtn = document.getElementById('cart-btn');
            if (cartBtn) {
                cartBtn.addEventListener('click', function() { navigate('cart'); });
            }
            document.querySelectorAll('.mobile-nav__item').forEach(function(item) {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    var page = item.dataset.page;
                    if (page) navigate(page);
                });
            });
        }

        function updateCartCount() {
            var localCart = JSON.parse(localStorage.getItem('enotspace_cart') || '[]');
            var total = localCart.reduce(function(s, i) { return s + i.quantity; }, 0);
            var cartCountEl = document.getElementById('cart-count');
            if (cartCountEl) {
                cartCountEl.textContent = total;
                cartCountEl.style.display = total > 0 ? 'flex' : 'none';
            }
        }

        function setupStickyHeader() {
            var header = document.getElementById('site-header');
            if (!header) return;
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 60) {
                    header.classList.add('header--compact');
                } else {
                    header.classList.remove('header--compact');
                }
            }, { passive: true });
        }

        setupNavigation();
        setupStickyHeader();
        updateCartCount();
        updateAuthUI();
        if (typeof setupFavoritesNav === 'function') setupFavoritesNav();
        if (typeof initTheme === 'function') initTheme();

        var loginBtn = document.getElementById('login-btn');
        if (loginBtn) {
            loginBtn.addEventListener('click', function() { openAuth(); });
        }

        document.getElementById('auth-placeholder').innerHTML = PAGES.auth_modal;
        document.getElementById('footer-placeholder').innerHTML = PAGES.footer;
        initAuth();

        navigate('catalog');
    </script>
</body>
</html>
