<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnotSpace</title>
    <meta name="description" content="EnotSpace - каталог товаров, 3D-печать, моделирование и сканирование">
    <link rel="stylesheet" href="style/reset.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/header.css">
    <link rel="stylesheet" href="style/catalog.css">
    <link rel="stylesheet" href="style/services.css">
    <link rel="stylesheet" href="style/fullcycle.css">
    <link rel="stylesheet" href="style/print_by_model.css">
    <link rel="stylesheet" href="style/cart.css">
    <link rel="stylesheet" href="style/service_page.css">
    <link rel="stylesheet" href="style/account.css">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/footer.css">
    <link rel="stylesheet" href="style/features.css">
</head>

<body>
    <header class="header" id="site-header">
        <div class="header__container">
            <nav class="header__nav">
                <a href="index.html" class="header__logo-link">
                    <img class="header__logo" src="assets/favicon.ico" alt="EnotSpace">
                </a>
                <ul class="header__list-items">
                    <li><a class="header__link active" href="#" data-page="catalog">Каталог</a></li>
                    <li><a class="header__link" href="#" data-page="services">Услуги</a></li>
                    <li><a class="header__link" href="#" data-page="3dmodels">3D модели</a></li>
                    <li><a class="header__link" href="#" data-page="favorites">&#9825; Избранное</a></li>
                    <li><a class="header__link" href="#" data-page="reviews">Отзывы</a></li>
                    <li><a class="header__link" href="#" data-page="about">О нас</a></li>
                </ul>
                <div class="header__actions">
                    <button class="header__theme-btn" id="theme-toggle" title="Сменить тему">&#9790;</button>
                    <button class="header__cart-btn" id="cart-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <path d="M16 10a4 4 0 0 1-8 0"></path>
                        </svg>
                        <span class="header__cart-count" id="cart-count" style="display: none;">0</span>
                    </button>
                    <button class="header__login-btn">Вход</button>
                </div>
            </nav>
        </div>
    </header>

    <div id="auth-placeholder"></div>

    <div id="main-placeholder"></div>

    <div id="footer-placeholder"></div>

    <script src="src/js/utils.js"></script>
    <script src="src/data/products.js"></script>
    <script src="src/data/pages.js"></script>
    <script src="src/js/catalog.js"></script>
    <script src="src/js/fullcycle.js"></script>
    <script src="src/js/print_by_model.js"></script>
    <script src="src/js/cart.js"></script>
    <script src="src/js/service_pages.js"></script>
    <script src="src/js/auth.js"></script>
    <script src="src/js/admin.js"></script>
    <script src="src/js/admin_catalog.js"></script>
    <script src="src/js/client_features.js"></script>
    <script src="src/js/features.js"></script>

    <script>
        const routes = {
            catalog: 'catalog',
            services: 'services',
            '3dmodels': 'catalog',
            fullcycle: 'fullcycle',
            print: 'print',
            modeling: 'modeling',
            scanning: 'scanning',
            cart: 'cart',
            account: 'account',
            favorites: 'favorites',
            reviews: 'reviews',
            about: 'about'
        };

        function navigate(page) {
            if (!routes[page]) page = 'catalog';
            var key = routes[page];

            if (page === 'favorites') {
                document.getElementById('main-placeholder').innerHTML = renderFavoritesPage();
                updateActiveLink(page);
                window.scrollTo(0, 0);
                setTimeout(function() {
                    renderFavoriteButtons();
                    document.querySelectorAll('.product-card__fav-btn').forEach(function(btn) {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            var id = parseInt(btn.dataset.id);
                            var added = toggleFavorite(id);
                            if (!added) {
                                navigate('favorites');
                            } else {
                                btn.classList.add('active');
                                btn.innerHTML = '&#9829;';
                            }
                        });
                    });
                }, 100);
                return;
            }

            var html = PAGES[key];
            if (!html) return;

            document.getElementById('main-placeholder').innerHTML = html;
            updateActiveLink(page);
            window.scrollTo(0, 0);

            if (page === 'catalog' && typeof catalog !== 'undefined') {
                setTimeout(function() {
                    catalog.reinit();
                    renderCatalogAdminControls();
                    renderFavoriteButtons();
                }, 150);
            }
            if (page === 'services') {
                setupServiceCards();
            }
            if (page === 'fullcycle') {
                setTimeout(function() { initFullcycle(); }, 100);
            }
            if (page === 'print') {
                setTimeout(function() { initPrintOrder(); }, 100);
            }
            if (page === 'cart') {
                setTimeout(function() { initCart(); }, 100);
            }
            if (page === 'modeling' || page === 'scanning') {
                setTimeout(function() {
                    initServiceForms();
                    renderServicePriceEditor();
                }, 100);
            }
            if (page === 'account') {
                setTimeout(function() { initAccount(); }, 100);
            }
            if (page === 'reviews') {
                setTimeout(function() { initReviewsPage(); }, 100);
            }
            if (page === 'about') {
                document.getElementById('about-placeholder').innerHTML = renderAboutPage();
                setTimeout(initAboutPage, 100);
            }
        }

        function setupServiceCards() {
            document.querySelectorAll('.service-card[data-service]').forEach(function(card) {
                card.addEventListener('click', function() {
                    var service = card.dataset.service;
                    if (routes[service]) {
                        navigate(service);
                    }
                });
            });
        }

        function updateActiveLink(page) {
            document.querySelectorAll('.header__link').forEach(function(link) {
                link.classList.remove('active');
                if (link.dataset.page === page) {
                    link.classList.add('active');
                }
            });
        }

        function setupNavigation() {
            document.querySelectorAll('.header__link').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var page = link.dataset.page;
                    if (page) navigate(page);
                });
            });
            var cartBtn = document.getElementById('cart-btn');
            if (cartBtn) {
                cartBtn.addEventListener('click', function() { navigate('cart'); });
            }
        }

        function updateCartCount() {
            var localCart = JSON.parse(localStorage.getItem('enotspace_cart') || '[]');
            var total = localCart.reduce(function(s, i) { return s + i.quantity; }, 0);
            var cartCountEl = document.getElementById('cart-count');
            if (cartCountEl) {
                cartCountEl.textContent = total;
                cartCountEl.style.display = total > 0 ? 'flex' : 'none';
            }
        }

        function setupStickyHeader() {
            var header = document.getElementById('site-header');
            if (!header) return;
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 60) {
                    header.classList.add('header--compact');
                } else {
                    header.classList.remove('header--compact');
                }
            }, { passive: true });
        }

        function seedAccounts() {
            var users = JSON.parse(localStorage.getItem('enotspace_users') || '[]');
            var hasAdmin = users.some(function(u) { return u.id === 'USR-ADMIN-001'; });
            var hasClient = users.some(function(u) { return u.id === 'USR-CLIENT-001'; });

            if (!hasAdmin) {
                users.push({
                    id: 'USR-ADMIN-001',
                    name: 'Админ',
                    phone: '+7 (900) 111-11-11',
                    email: 'admin@enotspace.ru',
                    password: hashPassword('admin123'),
                    role: 'admin',
                    createdAt: '2025-01-01T00:00:00.000Z'
                });
            }

            if (!hasClient) {
                users.push({
                    id: 'USR-CLIENT-001',
                    name: 'Иван Петров',
                    phone: '+7 (900) 222-22-22',
                    email: 'ivan@example.com',
                    password: hashPassword('client123'),
                    role: 'client',
                    createdAt: '2025-03-15T10:30:00.000Z'
                });
            }

            localStorage.setItem('enotspace_users', JSON.stringify(users));

            var projects = JSON.parse(localStorage.getItem('enotspace_projects') || '[]');
            var hasProjects = projects.some(function(p) { return p.id === 'PRJ-1001'; });

            if (!hasProjects) {
                var clientProjects = [
                    {
                        id: 'PRJ-1001',
                        status: 'completed',
                        type: 'fullcycle',
                        createdAt: '2025-03-20T09:00:00.000Z',
                        description: 'Сломалась ручка от шкафа в кухне. Нужна точная замена размером 120x40x25 мм.',
                        material: 'pla',
                        urgency: 'standard',
                        photos: 3,
                        contact: { name: 'Иван Петров', phone: '+7 (900) 222-22-22', telegram: '@ivan_p', email: 'ivan@example.com' },
                        price: '2 850',
                        messages: [
                            { from: 'user', text: 'Здравствуйте, хочу заказать замену ручки.', date: '2025-03-20T09:05:00.000Z' },
                            { from: 'admin', text: 'Здравствуйте! Мы изучили фото. Стоимость моделирования 700₽, печати — 2 150₽. Итого 2 850₽. Согласны?', date: '2025-03-20T14:20:00.000Z' },
                            { from: 'user', text: 'Да, согласен. Можно быстрее?', date: '2025-03-20T15:10:00.000Z' },
                            { from: 'admin', text: 'Да, возьмём ускоренный режим. Готово будет через 3 дня.', date: '2025-03-20T15:30:00.000Z' }
                        ],
                        timeline: [
                            { status: 'new', date: '2025-03-20T09:00:00.000Z', text: 'Заявка создана' },
                            { status: 'in_progress', date: '2025-03-20T14:20:00.000Z', text: 'Заявка принята, начата работа' },
                            { status: 'in_progress', date: '2025-03-21T11:00:00.000Z', text: '3D-модель готова, начата печать' },
                            { status: 'completed', date: '2025-03-23T16:00:00.000Z', text: 'Заказ готов к выдаче' }
                        ]
                    },
                    {
                        id: 'PRJ-1002',
                        status: 'in_progress',
                        type: 'print',
                        createdAt: '2025-05-10T11:00:00.000Z',
                        description: 'Кронштейн для монитора. Нужно 5 штук. Нагрузка до 10 кг.',
                        file: 'bracket_v3.stl',
                        quantity: 5,
                        color: 'black',
                        urgency: 'fast',
                        contact: { name: 'Иван Петров', phone: '+7 (900) 222-22-22' },
                        price: null,
                        messages: [
                            { from: 'admin', text: 'Файл принят. Анализируем в слайсере. Примерная стоимость — от 4 000₽ за 5 штук.', date: '2025-05-10T14:00:00.000Z' }
                        ],
                        timeline: [
                            { status: 'new', date: '2025-05-10T11:00:00.000Z', text: 'Заявка на печать создана' },
                            { status: 'in_progress', date: '2025-05-10T14:00:00.000Z', text: 'Анализ модели в слайсере' }
                        ]
                    },
                    {
                        id: 'PRJ-1003',
                        status: 'new',
                        type: 'modeling',
                        createdAt: '2025-06-12T08:45:00.000Z',
                        description: 'Нужно смоделировать корпус для Arduino Nano с креплением на DIN-рейку.',
                        contact: { name: 'Иван Петров', phone: '+7 (900) 222-22-22', telegram: '@ivan_p' },
                        messages: [],
                        timeline: [
                            { status: 'new', date: '2025-06-12T08:45:00.000Z', text: 'Заявка создана' }
                        ]
                    }
                ];

                var adminProjects = [
                    {
                        id: 'PRJ-2001',
                        status: 'in_progress',
                        type: 'scanning',
                        createdAt: '2025-06-01T10:00:00.000Z',
                        description: 'Сканирование детали engine mount. Оцифровка для последующей печати.',
                        contact: { name: 'Сергей К.', phone: '+7 (911) 333-44-55', telegram: '@sergey_k' },
                        messages: [
                            { from: 'admin', text: 'Добро пожаловать! Сканирование будет готово через 2 дня.', date: '2025-06-01T12:00:00.000Z' }
                        ],
                        timeline: [
                            { status: 'new', date: '2025-06-01T10:00:00.000Z', text: 'Заявка создана' },
                            { status: 'in_progress', date: '2025-06-01T12:00:00.000Z', text: 'Сканирование начато' }
                        ]
                    }
                ];

                projects = projects.concat(clientProjects).concat(adminProjects);
            localStorage.setItem('enotspace_projects', JSON.stringify(projects));
            }

            var purchased = JSON.parse(localStorage.getItem('enotspace_purchased') || '[]');
            if (purchased.length === 0) {
                localStorage.setItem('enotspace_purchased', JSON.stringify([1, 3, 6]));
            }
        }

        seedAccounts();

        setupNavigation();
        setupStickyHeader();
        updateCartCount();
        updateAuthUI();
        if (typeof setupFavoritesNav === 'function') setupFavoritesNav();
        if (typeof initTheme === 'function') initTheme();

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        document.getElementById('auth-placeholder').innerHTML = PAGES.auth_modal;
        document.getElementById('footer-placeholder').innerHTML = PAGES.footer;
        initAuth();

        navigate('catalog');
    </script>
</body>
</html>
